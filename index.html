<!DOCTYPE html>
<html>
<head>

<title>Shadow Organization Command Network</title>

<style>

body{
background:#070707;
color:#ff1a1a;
font-family:Courier New;
margin:0;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid red;
}

#title{
font-size:28px;
letter-spacing:5px;
}

#loginBox{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid red;
padding:30px;
background:black;
}

input,button{
background:black;
border:1px solid red;
color:red;
padding:6px;
margin:4px;
}

#tabs{
display:none;
text-align:center;
background:#111;
padding:10px;
}

.panel{
display:none;
padding:20px;
}

.section{
border:1px solid red;
margin-top:15px;
padding:10px;
}

#terminal{
height:200px;
overflow:auto;
border:1px solid red;
padding:10px;
}

#chat{
height:150px;
overflow:auto;
border:1px solid red;
padding:10px;
}

#aiChat{
height:200px;
overflow:auto;
border:1px solid red;
padding:10px;
}

</style>

</head>

<body>

<header>
<div id="title">SHADOW ORGANIZATION NETWORK</div>
</header>

<div id="loginBox">

<h2>Secure Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">ENTER</button>

<p id="msg"></p>

</div>

<div id="tabs">

<button onclick="openPanel('dashboard')">Dashboard</button>
<button onclick="openPanel('missions')">Missions</button>
<button onclick="openPanel('agents')">Agents</button>
<button onclick="openPanel('terminalPanel')">Command AI</button>
<button onclick="openPanel('chatPanel')">Agent Chat</button>
<button onclick="openPanel('aiChatPanel')">AI Chat</button>
<button onclick="openPanel('adminPanel')">Admin</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="panel">

<h2>Status Dashboard</h2>

<div id="status"></div>

</div>

<!-- MISSIONS -->

<div id="missions" class="panel">

<h2>Missions</h2>

<ul id="missionList"></ul>

<input id="mName" placeholder="Mission name">
<input id="mLoc" placeholder="Location">

<button onclick="addMission()">Add Mission</button>

</div>

<!-- AGENTS -->

<div id="agents" class="panel">

<h2>Agents</h2>

<ul id="agentList"></ul>

<input id="aName" placeholder="Agent name">
<input id="aRank" placeholder="Rank">

<button onclick="addAgent()">Add Agent</button>

</div>

<!-- COMMAND AI -->

<div id="terminalPanel" class="panel">

<h2>Command AI</h2>

<div id="terminal">Shadow Command AI Online</div>

<input id="command" placeholder="Enter command">

</div>

<!-- CHAT -->

<div id="chatPanel" class="panel">

<h2>Agent Chat</h2>

<div id="chat"></div>

<input id="chatInput">
<button onclick="sendChat()">Send</button>

</div>

<!-- AI CHAT -->

<div id="aiChatPanel" class="panel">

<h2>Shadow AI Assistant</h2>

<div id="aiChat"></div>

<input id="aiInput" placeholder="Ask the AI">
<button onclick="chatAI()">Send</button>

</div>

<!-- ADMIN -->

<div id="adminPanel" class="panel">

<h2>Admin Panel</h2>

<h3>Create User</h3>

<input id="newUser" placeholder="username">
<input id="newPass" placeholder="password">

<button onclick="createUser()">Create</button>

<h3>Lock User</h3>

<input id="lockUserBox">

<button onclick="lockUser()">Lock</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* USERS */

let users={

"Shadow Umbra":{password:"Shadow Umbra",role:"owner",locked:false},

"Admin1":{password:"Shadow01",role:"admin",locked:false},
"Admin2":{password:"Shadow02",role:"admin",locked:false},
"Admin3":{password:"Shadow03",role:"admin",locked:false},
"Admin4":{password:"Shadow04",role:"admin",locked:false},

"Agent1":{password:"Agent01",role:"member",locked:false}

}

let currentUser=null

/* LOGIN */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].password===p){

if(users[u].locked){
msg.innerHTML="ACCOUNT LOCKED"
return
}

currentUser=u

loginBox.style.display="none"
tabs.style.display="block"

openPanel("dashboard")

updateStatus()

}else{

msg.innerHTML="ACCESS DENIED"

}

}

/* PANELS */

function openPanel(name){

document.querySelectorAll(".panel").forEach(p=>{
p.style.display="none"
})

document.getElementById(name).style.display="block"

}

/* DASHBOARD */

function updateStatus(){

let agents=document.getElementById("agentList").children.length
let missions=document.getElementById("missionList").children.length

document.getElementById("status").innerHTML=

"Network: Online<br>"+
"Active Agents: "+agents+"<br>"+
"Active Missions: "+missions+"<br>"+
"Threat Level: Low"

}

/* MISSIONS */

function addMission(){

let li=document.createElement("li")

li.innerText=mName.value+" — "+mLoc.value

missionList.appendChild(li)

updateStatus()

}

/* AGENTS */

function addAgent(){

let li=document.createElement("li")

li.innerText=aName.value+" | "+aRank.value

agentList.appendChild(li)

updateStatus()

}

/* CHAT */

function sendChat(){

chat.innerHTML+="<br>"+currentUser+": "+chatInput.value

chatInput.value=""

}

/* AI CHAT */

function chatAI(){

let msg=aiInput.value.toLowerCase()

let response=""

if(msg.includes("hello")){

response="Hello agent. What can I help you with today?"

}

else if(msg.includes("who are you")){

response="I am the Shadow Organization assistant AI designed to help agents."

}

else if(msg.includes("mission")){

response="Current mission database is active. You can add or review missions in the missions tab."

}

else if(msg.includes("status")){

response="All systems are operational. Network integrity is stable."

}

else if(msg.includes("shadow organization")){

response="Shadow Organization is a covert intelligence and operations network."

}

else{

response="Processing request... I am still learning but I will try to assist."

}

aiChat.innerHTML+="<br>You: "+msg
aiChat.innerHTML+="<br>AI: "+response

aiInput.value=""

}

/* ADMIN */

function createUser(){

let u=newUser.value
let p=newPass.value

users[u]={password:p,role:"member",locked:false}

alert("User Created")

}

function lockUser(){

let u=document.getElementById("lockUserBox").value

if(users[u]){

users[u].locked=true

alert("User Locked")

}

}

/* COMMAND AI */

document.getElementById("command").addEventListener("keypress",function(e){

if(e.key==="Enter"){

let cmd=this.value.toLowerCase()

terminal.innerHTML+="<br>> "+cmd

runCommand(cmd)

this.value=""

}

})

function runCommand(cmd){

if(cmd=="hello"){

terminal.innerHTML+="<br>AI: Greetings agent."

}

else if(cmd=="status"){

terminal.innerHTML+="<br>AI: Shadow network operational."

}

else if(cmd=="agents"){

terminal.innerHTML+="<br>"+agentList.innerText

}

else if(cmd=="missions"){

terminal.innerHTML+="<br>"+missionList.innerText

}

else if(cmd=="make pdf"){

createPDF()

}

else{

terminal.innerHTML+="<br>AI: Command not recognized."

}

}

/* PDF */

function createPDF(){

const { jsPDF } = window.jspdf

const doc=new jsPDF()

doc.text("Shadow Organization Intelligence Report",20,20)
doc.text("Generated by "+currentUser,20,40)
doc.text("System Status: Operational",20,60)

doc.save("shadow_report.pdf")

terminal.innerHTML+="<br>PDF generated successfully."

}

</script>

</body>
</html>
