<!DOCTYPE html>
<html>
<head>

<title>Shadow Organization Command Network</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
background:#070707;
color:#ff1a1a;
font-family:Courier New;
margin:0;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #8b0000;
}

#title{
font-size:30px;
letter-spacing:5px;
}

#loginBox{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid red;
padding:30px;
background:black;
}

input,button{
background:black;
border:1px solid red;
color:red;
padding:6px;
margin:5px;
}

#tabs{
display:none;
background:#111;
padding:10px;
text-align:center;
}

.panel{
display:none;
padding:20px;
}

.section{
border:1px solid red;
margin-top:15px;
padding:10px;
}

#terminal,#chatBox{
height:200px;
overflow:auto;
border:1px solid red;
padding:10px;
}

#clock{
font-size:18px;
margin-top:10px;
}

#map{
height:450px;
border:2px solid red;
}

</style>

</head>

<body>

<header>

<div id="title">SHADOW ORGANIZATION COMMAND NETWORK</div>

<svg width="120" height="120" viewBox="0 0 500 500">
<circle cx="250" cy="250" r="200" stroke="#8b0000" stroke-width="8" fill="none"/>
<polygon points="250,90 280,220 420,220 300,300 340,430 250,350 160,430 200,300 80,220 220,220" fill="#8b0000"/>
</svg>

</header>

<div id="loginBox">

<h2>Secure Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">ENTER</button>

</div>

<div id="tabs">

<button onclick="openPanel('dashboard')">Dashboard</button>
<button onclick="openPanel('missions')">Missions</button>
<button onclick="openPanel('agents')">Agents</button>
<button onclick="openPanel('mapPanel')">Operations Map</button>
<button onclick="openPanel('intel')">Intel</button>
<button onclick="openPanel('terminalPanel')">Command AI</button>
<button onclick="openPanel('chatPanel')">AI Chat</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="panel">

<h2>System Status</h2>

<div id="clock"></div>

<div class="section">
Network Status: ONLINE<br>
Threat Level: LOW
</div>

</div>

<!-- MISSIONS -->

<div id="missions" class="panel">

<h2>Mission Database</h2>

<ul id="missionList"></ul>

<input id="mName" placeholder="Mission Name">
<input id="mLat" placeholder="Latitude">
<input id="mLng" placeholder="Longitude">

<button onclick="addMission()">Add Mission</button>

</div>

<!-- AGENTS -->

<div id="agents" class="panel">

<h2>Agent Profiles</h2>

<ul id="agentList"></ul>

<input id="aName" placeholder="Agent Name">
<input id="aRank" placeholder="Rank">

<button onclick="addAgent()">Add Agent</button>

</div>

<!-- MAP -->

<div id="mapPanel" class="panel">

<h2>Global Operations Map</h2>

<div id="map"></div>

</div>

<!-- INTEL -->

<div id="intel" class="panel">

<h2>Intel Vault</h2>

<button onclick="makePDF()">Generate Intel Report PDF</button>

</div>

<!-- COMMAND AI -->

<div id="terminalPanel" class="panel">

<h2>Shadow Command AI</h2>

<div id="terminal">Shadow AI Ready — type "help"</div>

<input id="command" placeholder="Enter command">

</div>

<!-- CHAT AI -->

<div id="chatPanel" class="panel">

<h2>Shadow AI Assistant</h2>

<div id="chatBox"></div>

<input id="aiInput" placeholder="Ask the AI">
<button onclick="chatAI()">Send</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let users={
"Shadow Umbra":{password:"Shadow Umbra"}
}

let currentUser=null

function login(){

if(users[user.value] && users[user.value].password===pass.value){

currentUser=user.value

loginBox.style.display="none"
tabs.style.display="block"

openPanel("dashboard")

startClock()

initMap()

}

}

function openPanel(name){

document.querySelectorAll(".panel").forEach(p=>p.style.display="none")

document.getElementById(name).style.display="block"

}

/* CLOCK */

function startClock(){

setInterval(()=>{

let now=new Date()

clock.innerHTML=
"Day: "+now.toLocaleDateString(undefined,{weekday:"long"})+
"<br>Date: "+now.toLocaleDateString()+
"<br>Time: "+now.toLocaleTimeString()

},1000)

}

/* MAP */

let map

function initMap(){

map=L.map('map').setView([20,0],2)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

}

/* MISSIONS */

function addMission(){

let name=mName.value
let lat=parseFloat(mLat.value)
let lng=parseFloat(mLng.value)

let li=document.createElement("li")
li.innerText=name+" ("+lat+","+lng+")"
missionList.appendChild(li)

L.marker([lat,lng]).addTo(map).bindPopup(name)

}

/* AGENTS */

function addAgent(){

let li=document.createElement("li")
li.innerText=aName.value+" | "+aRank.value
agentList.appendChild(li)

}

/* PDF */

function makePDF(){

const { jsPDF } = window.jspdf

const doc=new jsPDF()

doc.text("Shadow Organization Intel Report",20,20)

doc.save("shadow_report.pdf")

}

/* COMMAND AI */

command.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let cmd=command.value.toLowerCase()

terminal.innerHTML+="<br>> "+cmd

let now=new Date()

if(cmd==="help"){
terminal.innerHTML+=`
<br>COMMAND LIST
<br>help
<br>time
<br>date
<br>day
<br>status
<br>clear
<br>make pdf
`
}

else if(cmd==="time") terminal.innerHTML+="<br>"+now.toLocaleTimeString()
else if(cmd==="date") terminal.innerHTML+="<br>"+now.toLocaleDateString()
else if(cmd==="day") terminal.innerHTML+="<br>"+now.toLocaleDateString(undefined,{weekday:"long"})
else if(cmd==="status") terminal.innerHTML+="<br>Shadow Network Online"
else if(cmd==="clear") terminal.innerHTML="Shadow AI Ready"
else if(cmd==="make pdf") makePDF()

command.value=""

}

})

/* CHAT AI */

function chatAI(){

let text=aiInput.value.toLowerCase()
let now=new Date()

let reply="Processing..."

if(text.includes("hello")) reply="Hello agent "+currentUser
else if(text.includes("time")) reply="Time: "+now.toLocaleTimeString()
else if(text.includes("date")) reply="Date: "+now.toLocaleDateString()
else if(text.includes("day")) reply="Today is "+now.toLocaleDateString(undefined,{weekday:"long"})
else reply="Shadow AI analyzing your request."

chatBox.innerHTML+="<br>You: "+text
chatBox.innerHTML+="<br>AI: "+reply

aiInput.value=""

}

</script>

</body>
</html>
